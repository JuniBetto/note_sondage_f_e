org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=2G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
android.enableJetifier=true

# ── Ottimizzazioni velocità build ──
# Daemon Gradle: mantiene il processo JVM in vita tra le build
org.gradle.daemon=true
# Build parallela: compila i moduli indipendenti in parallelo
org.gradle.parallel=true
# Caching: riusa gli output delle build precedenti
org.gradle.caching=true
