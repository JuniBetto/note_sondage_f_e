name: Flutter CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # -----------------------------------------------------------
  # BASE JOB: analyze + test + code metrics
  # -----------------------------------------------------------
  analyze_test:
    name: Analyze + Test + Metrics
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Dart Code Metrics
        run: dart pub global activate dart_code_metrics

      - name: Flutter Pub Get
        run: flutter pub get

      - name: Flutter Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Run Dart Code Metrics (metrics)
        run: |
          dart run dart_code_metrics:metrics analyze lib --reporter=github

      - name: Run Dart Code Metrics (check unused code)
        run: |
          dart run dart_code_metrics:metrics check-unused-code lib

      - name: Run Tests + Coverage
        run: flutter test --coverage

      - name: Upload Coverage
        uses: actions/upload-artifact@v4
        with:
          name: test-coverage
          path: coverage/lcov.info

  # -----------------------------------------------------------
  # ANDROID BUILD
  # -----------------------------------------------------------
  build_android:
    name: Build Android APK & AAB
    runs-on: ubuntu-latest
    needs: analyze_test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter Pub Get
        run: flutter pub get

      - name: Build APK Release
        run: flutter build apk --release

      - name: Build AAB Release
        run: flutter build appbundle --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: build/app/outputs/bundle/release/app-release.aab

  # -----------------------------------------------------------
  # WEB BUILD
  # -----------------------------------------------------------
  build_web:
    name: Build Web
    runs-on: ubuntu-latest
    needs: analyze_test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2

      - name: Flutter Pub Get
        run: flutter pub get

      - name: Build Web
        run: flutter build web --release

      - name: Upload Web Artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-web
          path: build/web

  # -----------------------------------------------------------
  # iOS BUILD (richiede macOS)
  # -----------------------------------------------------------
  build_ios:
    name: Build iOS
    runs-on: macos-latest
    needs: analyze_test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2

      - name: Install CocoaPods
        run: sudo gem install cocoapods

      - name: Flutter Pub Get
        run: flutter pub get

      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Upload iOS Folder
        uses: actions/upload-artifact@v4
        with:
          name: ios-release
          path: build/ios/iphoneos
