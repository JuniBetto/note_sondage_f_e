services:
  web-nginx:
    image: docker.io/library/nginx:1.27-alpine
    container_name: note_sondage_web
    env_file:
      - .env.web
    volumes:
      - /opt/note-sondage/web:/usr/share/nginx/html:ro
      - ./nginx/templates-lan-http/default.conf.template:/etc/nginx/templates/default.conf.template:ro
    restart: unless-stopped
    networks:
      note-sondage-public:
        aliases:
          - notesondage-web

networks:
  note-sondage-public:
    external: true
    name: note-sondage-public